name: Publish CLI npm

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'tachyon-cli-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Check package
        run: npm run check

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="tachyon-cli-v${PKG_VERSION}"
          if [ "${{ github.event.release.tag_name }}" != "$EXPECTED_TAG" ]; then
            echo "release tag ${{ github.event.release.tag_name }} does not match package version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Check if already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
